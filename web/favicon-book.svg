<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Cover gradients - deep navy/indigo leather -->
    <linearGradient id="coverL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3a6e" />
      <stop offset="1" stop-color="#111d45" />
    </linearGradient>
    <linearGradient id="coverR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3a6e" />
      <stop offset="1" stop-color="#111d45" />
    </linearGradient>
    <!-- Page gradients - warm cream -->
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fefaf2" />
      <stop offset="1" stop-color="#e8d9bc" />
    </linearGradient>
    <linearGradient id="pageEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d99e" />
      <stop offset="1" stop-color="#c9a85c" />
    </linearGradient>
    <!-- Spine gradient -->
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2b5c" />
      <stop offset="1" stop-color="#0a1428" />
    </linearGradient>
    <!-- Top arc / fore-edge curve of pages -->
    <linearGradient id="topArc" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e8d9bc" />
      <stop offset="1" stop-color="#fefaf2" />
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#080e24" flood-opacity="0.45" />
    </filter>
    <!-- Ribbon bookmark -->
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c0392b" />
      <stop offset="1" stop-color="#8e1b12" />
    </linearGradient>
  </defs>

  <!-- Drop shadow base -->
  <ellipse cx="32" cy="59" rx="22" ry="2.8" fill="#060d20" opacity="0.35" />

  <g filter="url(#shadow)">

    <!-- ── LEFT COVER ── -->
    <path d="M7.5 21.5 L30.8 23.5 L30.8 55.8 L7.5 53.5 Z"
          fill="url(#coverL)" stroke="#c8a84b" stroke-width="1.3" stroke-linejoin="round" />
    <!-- Cover inner bevel line -->
    <path d="M10.5 23.8 L29.4 25.4 L29.4 53.4 L10.5 51.7 Z"
          fill="none" stroke="#4a6aad" stroke-width="0.7" opacity="0.6" />

    <!-- ── RIGHT COVER ── -->
    <path d="M56.5 21.5 L33.2 23.5 L33.2 55.8 L56.5 53.5 Z"
          fill="url(#coverR)" stroke="#c8a84b" stroke-width="1.3" stroke-linejoin="round" />
    <!-- Cover inner bevel line -->
    <path d="M53.5 23.8 L34.6 25.4 L34.6 53.4 L53.5 51.7 Z"
          fill="none" stroke="#4a6aad" stroke-width="0.7" opacity="0.6" />

    <!-- ── LEFT PAGE ── -->
    <path d="M10.5 17.8 L30.4 19.8 L30.4 53.0 L10.5 51.0 Z"
          fill="url(#page)" stroke="#d9c38a" stroke-width="0.75" />
    <!-- Left page top arc (folio curve) -->
    <path d="M9.8 20.8 C16.5 18.2 23.8 17.5 30.8 19.0 L30.4 21.2 C23.5 19.8 16.4 20.5 10.2 23.0 Z"
          fill="url(#topArc)" stroke="#d9c38a" stroke-width="0.6" />
    <!-- Left page gilt bottom edge -->
    <path d="M10.5 51.0 L30.4 53.0 L30.4 51.0 L10.5 49.0 Z"
          fill="url(#pageEdge)" />
    <!-- Left text lines (data rows) -->
    <path d="M13.5 27.5 L27.5 28.7
             M13.5 31.5 L27.5 32.7
             M13.5 35.5 L27.5 36.7
             M13.5 39.5 L27.5 40.7
             M13.5 43.5 L27.5 44.7"
          stroke="#8ca0c8" stroke-width="0.9" stroke-linecap="round" opacity="0.65" />
    <!-- Shorter accent line (chapter break style) -->
    <path d="M13.5 47.5 L22.0 48.2"
          stroke="#c8a84b" stroke-width="0.9" stroke-linecap="round" opacity="0.7" />

    <!-- ── RIGHT PAGE ── -->
    <path d="M53.5 17.8 L33.6 19.8 L33.6 53.0 L53.5 51.0 Z"
          fill="url(#page)" stroke="#d9c38a" stroke-width="0.75" />
    <!-- Right page top arc -->
    <path d="M54.2 20.8 C47.5 18.2 40.2 17.5 33.2 19.0 L33.6 21.2 C40.5 19.8 47.6 20.5 53.8 23.0 Z"
          fill="url(#topArc)" stroke="#d9c38a" stroke-width="0.6" />
    <!-- Right page gilt bottom edge -->
    <path d="M53.5 51.0 L33.6 53.0 L33.6 51.0 L53.5 49.0 Z"
          fill="url(#pageEdge)" />
    <!-- Right text lines -->
    <path d="M50.5 27.5 L36.5 28.7
             M50.5 31.5 L36.5 32.7
             M50.5 35.5 L36.5 36.7
             M50.5 39.5 L36.5 40.7
             M50.5 43.5 L36.5 44.7"
          stroke="#8ca0c8" stroke-width="0.9" stroke-linecap="round" opacity="0.65" />
    <!-- Shorter accent line -->
    <path d="M50.5 47.5 L42.0 48.2"
          stroke="#c8a84b" stroke-width="0.9" stroke-linecap="round" opacity="0.7" />

    <!-- ── SPINE ── -->
    <path d="M31.0 24.5 C31.4 23.0 32.6 23.0 33.0 24.5 L33.0 55.5 C32.6 57.8 31.4 57.8 31.0 55.5 Z"
          fill="url(#spine)" stroke="#c8a84b" stroke-width="1.1" />
    <!-- Spine decorative bands -->
    <path d="M31.5 28.5 L32.5 28.5 M31.5 32.0 L32.5 32.0"
          stroke="#6a8ace" stroke-width="0.65" fill="none" stroke-linecap="round" />

    <!-- ── GILT PAGE CORNERS (top) ── -->
    <path d="M10.5 17.8 L12.5 17.95 L12.5 19.5 L10.5 19.35 Z" fill="#c8a84b" opacity="0.8" />
    <path d="M53.5 17.8 L51.5 17.95 L51.5 19.5 L53.5 19.35 Z" fill="#c8a84b" opacity="0.8" />

    <!-- ── RIBBON BOOKMARK ── -->
    <rect x="30.25" y="18" width="3.5" height="22" fill="url(#ribbon)" />
    <!-- Ribbon V-notch tail -->
    <path d="M30.25 40 L32 43.5 L33.75 40 Z" fill="url(#ribbon)" />

  </g>
</svg>
